# Отдельный server block — не трогает aza-style и logicroom.
#
# ВАЖНО: PROJECT_DIR должен совпадать с реальным путём на сервере.
# Nginx (www-data) не читает файлы из /root/ — лучше держать проект в /var/www/.
#
# Установка:
#   sudo cp deploy/nginx-green-cafe-str.ru.conf /etc/nginx/sites-available/green-cafe-str.ru
#   sudo ln -s /etc/nginx/sites-available/green-cafe-str.ru /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d green-cafe-str.ru -d www.green-cafe-str.ru

server {
    listen 80;
    server_name green-cafe-str.ru www.green-cafe-str.ru;

    client_max_body_size 20M;

    location /api/ {
        proxy_pass http://127.0.0.1:8036;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /root/grenn_studio/coffee-master/staticfiles/;
    }

    location /media/ {
        alias /root/grenn_studio/coffee-master/media/;
    }

    location / {
        proxy_pass http://127.0.0.1:8135;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
