{% extends 'panel/base.html' %}

{% block title %}Массовые цены{% endblock %}

{% block content %}
<div class="panel-head">
    <h1 class="panel-h1">Массовое изменение цен</h1>
    <a href="{% url 'panel_menu_list' %}" class="panel-btn">← Меню</a>
</div>

<div class="panel-callout">
    <p>Поднимите или снизьте цены сразу на все позиции или только в одной категории. Скидочные цены тоже пересчитаются.</p>
</div>

<form method="post" class="panel-form panel-form--wide">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="panel-form__actions">
        <button type="submit" class="panel-btn panel-btn--primary" onclick="return confirm('Применить изменение цен?')">Применить</button>
    </div>
</form>
{% endblock %}
